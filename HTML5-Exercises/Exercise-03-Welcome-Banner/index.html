<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>

    <style>

        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div id="welcomeBanner">
        <h1>Welcome to the Community Event Portal</h1>

        <p>
            Register today and get
            <span style="color:red; font-weight:bold;">
                20% Discount
            </span>
            on selected events!
        </p>
    </div>

    <h2 class="highlight">Upcoming Events</h2>

    <p class="highlight">
        Don't miss our cultural festival this weekend.
    </p>

</body>

</html>
