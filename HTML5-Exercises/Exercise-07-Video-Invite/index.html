<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Video Invite</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        #message {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Community Event Promo Video</h1>

    <video width="500"
           controls
           oncanplay="videoReady()">

        <source
            src="https://www.w3schools.com/html/mov_bbb.mp4"
            type="video/mp4">

        
    </video>

    <p id="message"></p>

    <br><br>

    <label>
        Event Registration Notes:
    </label>

    <textarea
        rows="5"
        cols="50"
        placeholder="Type something here..."></textarea>

    <script>

        function videoReady() {

            document.getElementById("message").innerHTML =
                "Video ready to play";
        }

        window.onbeforeunload = function () {

            return "Are you sure you want to leave this page?";
        };

    </script>

</body>

</html>
