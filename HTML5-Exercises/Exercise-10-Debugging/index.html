<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Debugging Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        #box {
            width: 250px;
            padding: 20px;
            background-color: lightblue;
            border: 2px solid black;
        }

        button {
            margin-top: 15px;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>Chrome DevTools Debugging Demo</h1>

    <div id="box">
        Community Event Portal
    </div>

    <button onclick="changeText()">
        Click Me
    </button>

    <script>

        console.log("Page Loaded Successfully");

        function changeText() {

            let message = "Welcome to CTS Digital Nurture";

            console.log("Button Clicked");

            console.log(message);

            document.getElementById("box").innerHTML =
                message;
        }

    </script>

</body>

</html>
