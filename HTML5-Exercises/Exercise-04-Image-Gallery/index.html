<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Community Event Gallery</title>

    <style>
        .eventImage {
            width: 200px;
            height: 150px;
            border: 3px solid black;
            padding: 5px;
        }

        table {
            margin: auto;
        }

        td {
            text-align: center;
            padding: 10px;
        }

        h1 {
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>Community Event Gallery</h1>

    <table>

        <tr>
            <td>
                <img src="https://picsum.photos/200/150?1"
                     alt="Music Event"
                     title="Music Festival"
                     class="eventImage">
                <p>Music Festival</p>
            </td>

            <td>
                <img src="https://picsum.photos/200/150?2"
                     alt="Sports Event"
                     title="Sports Meet"
                     class="eventImage">
                <p>Sports Meet</p>
            </td>

            <td>
                <img src="https://picsum.photos/200/150?3"
                     alt="Dance Event"
                     title="Dance Competition"
                     class="eventImage">
                <p>Dance Competition</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://picsum.photos/200/150?4"
                     alt="Food Festival"
                     title="Food Festival"
                     class="eventImage">
                <p>Food Festival</p>
            </td>

            <td>
                <img src="https://picsum.photos/200/150?5"
                     alt="Art Exhibition"
                     title="Art Exhibition"
                     class="eventImage">
                <p>Art Exhibition</p>
            </td>

            <td>
                <img src="https://picsum.photos/200/150?6"
                     alt="Community Meeting"
                     title="Community Meeting"
                     class="eventImage">
                <p>Community Meeting</p>
            </td>
        </tr>

    </table>

</body>

</html>
